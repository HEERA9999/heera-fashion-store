<!DOCTYPE html>
<html>
<head>
    <title>Diamond Fashion Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        .container {
            display: flex;
        }

        .products {
            width: 70%;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .product {
            background: white;
            width: 200px;
            margin: 15px;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background-color: black;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .cart {
            width: 30%;
            background: white;
            padding: 20px;
            box-shadow: -3px 0px 10px gray;
        }

        .cart h2 {
            text-align: center;
        }

        .cart ul {
            list-style: none;
            padding: 0;
        }

        .cart li {
            margin: 10px 0;
        }

        .total {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Diamond Fashion Store</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Shirt">
            <h3>Stylish Shirt</h3>
            <p>₹799</p>
            <button onclick="addToCart('Stylish Shirt', 799)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Dress">
            <h3>Trendy Dress</h3>
            <p>₹1299</p>
            <button onclick="addToCart('Trendy Dress', 1299)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="Jeans">
            <h3>Blue Jeans</h3>
            <p>₹999</p>
            <button onclick="addToCart('Blue Jeans', 999)">Add to Cart</button>
        </div>

    </section>

    <div class="cart">
        <h2>Shopping Cart 🛒</h2>
        <ul id="cart-items"></ul>
        <p class="total">Total: ₹<span id="total">0</span></p>
        <button onclick="clearCart()">Clear Cart</button>
    </div>

</div>

<script>
    let total = 0;

    function addToCart(name, price) {
        const cartItems = document.getElementById("cart-items");
        const li = document.createElement("li");
        li.textContent = name + " - ₹" + price;
        cartItems.appendChild(li);

        total += price;
        document.getElementById("total").textContent = total;
    }

    function clearCart() {
        document.getElementById("cart-items").innerHTML = "";
        total = 0;
        document.getElementById("total").textContent = total;
    }
</script>

</body>
</html>
